<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Šimonova Výzva: COCONUT Edition</title>
    <style>
        body {
            margin: 0; padding: 0; background: #fff5f8;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden; text-align: center; touch-action: manipulation;
        }
        #ui {
            padding: 15px; background: white; border-bottom: 4px solid #ff4081;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .stat { font-size: 24px; color: #ff4081; }
        #game-area { width: 100vw; height: 80vh; position: relative; }
        .egg { position: absolute; font-size: 60px; user-select: none; z-index: 10; cursor: pointer; filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.2)); }
        
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        .modal { background: white; padding: 30px; border-radius: 30px; color: #333; width: 320px; border: 5px solid #ff4081; }
        input { padding: 12px; font-size: 20px; width: 85%; margin: 15px 0; border: 3px solid #eee; border-radius: 15px; text-align: center; }
        button { padding: 15px 30px; font-size: 20px; background: #ff4081; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; }
        
        #final-score { font-size: 60px; color: #ff4081; margin: 10px 0; }
        .instruction { background: #fffde7; padding: 15px; border-radius: 15px; border: 2px dashed #fbc02d; font-size: 18px; line-height: 1.4; }
        
        #end-screen { display: none; background: black; }
        #end-screen img { width: 100%; height: auto; max-height: 70vh; }
        #dead-msg { color: #ff0000; font-size: 28px; margin-bottom: 20px; letter-spacing: 2px; }

        @keyframes shake { 0% {transform: translate(2px, 2px);} 50% {transform: translate(-3px, -2px);} 100% {transform: translate(2px, 3px);} }
        .vibrate { animation: shake 0.1s infinite; }
    </style>
</head>
<body>

    <div id="start-overlay" class="overlay">
        <div class="modal">
            <h1 style="margin:0; color:#ff4081;">Vajíčkobraní</h1>
            <p>Zadej svoje jméno:</p>
            <input type="text" id="player-name" placeholder="Šimon" maxlength="15">
            <button onclick="initGame()">SPUSTIT (30s)</button>
        </div>
    </div>

    <div id="result-overlay" class="overlay" style="display: none;">
        <div class="modal">
            <h2 style="margin:0;">TVOJE SKÓRE:</h2>
            <div id="final-score">0</div>
            <div class="instruction">
                📢 <strong>ÚKOL:</strong><br>
                Napiš svoje score do chatu <strong>COCONUT</strong> a označ <strong>@Jerryho</strong>!
            </div>
            <br>
            <button onclick="showChicken()">DOKONČIT A ZAVŘÍT</button>
        </div>
    </div>

    <div id="end-screen" class="overlay">
        <div id="dead-msg">PŘÍSTUP OMEZEN</div>
        <img src="https://static.wikia.nocookie.net/meme/images/7/7d/Chicken_Screaming_on_Tree.jpg" alt="Chicken">
    </div>

    <div id="ui">
        <div class="stat">👤 <span id="display-name">?</span></div>
        <div class="stat">🥚 <span id="score">0</span></div>
        <div class="stat">⏱️ <span id="timer">30</span>s</div>
    </div>

    <div id="game-area"></div>

    <audio id="snd-vibr" src="https://www.myinstants.com/media/sounds/vibrations.mp3"></audio>
    <audio id="snd-ding" src="https://www.myinstants.com/media/sounds/ding-sound-effect_1.mp3"></audio>
    <audio id="snd-chicken" src="https://www.myinstants.com/media/sounds/chicken-on-tree-screaming.mp3"></audio>

    <script>
        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        let timerInterval;

        const gArea = document.getElementById('game-area');
        const sVibr = document.getElementById('snd-vibr');
        const sDing = document.getElementById('snd-ding');
        const sChic = document.getElementById('snd-chicken');

        function initGame() {
            const name = document.getElementById('player-name').value || "Hráč";
            document.getElementById('display-name').innerText = name;
            document.getElementById('start-overlay').style.display = 'none';
            gameActive = true;
            
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) endGame();
            }, 1000);

            for(let i=0; i<3; i++) spawnEgg();
        }

        function spawnEgg() {
            if(!gameActive) return;
            const egg = document.createElement('div');
            egg.className = 'egg';
            egg.innerHTML = '🥚';
            egg.style.left = Math.random() * 80 + 10 + '%';
            egg.style.top = Math.random() * 80 + 10 + '%';

            const handle = (e) => {
                e.preventDefault();
                if(!gameActive) return;

                // Zvuky
                sDing.currentTime = 0; sDing.play();
                sVibr.currentTime = 0; sVibr.play();
                if(navigator.vibrate) navigator.vibrate(100);

                score++;
                document.getElementById('score').innerText = score;
                egg.remove();
                spawnEgg();
            };

            egg.onmousedown = handle;
            egg.ontouchstart = handle;
            gArea.appendChild(egg);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            
            // VYPNUTÍ ZVUKŮ
            sDing.pause(); sVibr.pause();
            gArea.innerHTML = "";
            
            document.getElementById('final-score').innerText = score;
            document.getElementById('result-overlay').style.display = 'flex';
        }

        function showChicken() {
            document.getElementById('result-overlay').style.display = 'none';
            document.getElementById('end-screen').style.display = 'flex';
            sChic.play();
            // Zablokování všeho
            document.body.onclick = () => { sChic.play(); };
        }
    </script>
</body>
</html>
